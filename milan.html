<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#3D3D3D">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lila Quotes — Request</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E07830;
    --orange-light: #f5a05a;
    --orange-dim: rgba(224,120,48,0.12);
    --charcoal: #3D3D3D;
    --charcoal-light: #5a5a5a;
    --bg: #f7f5f2;
    --card: #ffffff;
    --border: #e8e3dc;
    --text: #2a2a2a;
    --muted: #9a9a9a;
    --success: #2d9e6b;
    --danger: #d94f4f;
    --pending: #c87d1e;
    --radius: 14px;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--charcoal);
    padding: 18px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    color: var(--orange);
    letter-spacing: 0.5px;
  }

  .sp-badge {
    background: var(--orange-dim);
    border: 1px solid var(--orange);
    color: var(--orange);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ── Main ── */
  main {
    padding: 20px 16px 100px;
    max-width: 600px;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    color: var(--charcoal);
    margin-bottom: 4px;
  }

  .section-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }

  /* ── Form ── */
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--charcoal-light);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 6px;
  }

  input, select, textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--orange);
    background: #fff;
  }

  .field { margin-bottom: 16px; }

  /* ── Grade rows ── */
  .grades-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .grades-label {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    color: var(--charcoal);
  }

  .btn-add-grade {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--orange-dim);
    color: var(--orange);
    border: 1px solid var(--orange);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-add-grade:hover { background: rgba(224,120,48,0.2); }

  .grade-row {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    position: relative;
  }

  .grade-row-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .grade-num {
    font-size: 12px;
    font-weight: 600;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .btn-remove {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 6px;
    transition: background 0.2s;
  }

  .btn-remove:hover { background: rgba(217,79,79,0.1); }

  .grade-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .grade-grid .field { margin-bottom: 0; }
  .grade-grid .field.full { grid-column: 1 / -1; }

  /* ── Submit ── */
  .btn-submit {
    width: 100%;
    padding: 16px;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .btn-submit:hover { background: #c96a22; }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { background: var(--muted); cursor: not-allowed; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--charcoal);
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* ── History section ── */
  .history-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    color: var(--charcoal);
    margin-bottom: 14px;
  }

  .quote-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    overflow: hidden;
  }

  .quote-card-header {
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    cursor: pointer;
    user-select: none;
  }

  .quote-customer {
    font-weight: 600;
    font-size: 15px;
    color: var(--charcoal);
  }

  .quote-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }

  .status-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: 10px;
  }

  .status-pending { background: rgba(200,125,30,0.12); color: var(--pending); }
  .status-quoted { background: rgba(45,158,107,0.12); color: var(--success); }
  .status-denied { background: rgba(217,79,79,0.12); color: var(--danger); }

  .quote-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 14px 16px;
  }

  .quote-body.open { display: block; }

  .grade-item {
    background: var(--bg);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
  }

  .grade-item:last-child { margin-bottom: 0; }

  .grade-item-name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
    color: var(--charcoal);
  }

  .grade-item-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 12px;
    font-size: 13px;
    color: var(--charcoal-light);
  }

  .detail-pair span:first-child { color: var(--muted); font-size: 11px; display: block; }

  .mgmt-response {
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
  }

  .mgmt-response.quoted {
    background: rgba(45,158,107,0.08);
    border: 1px solid rgba(45,158,107,0.2);
  }

  .mgmt-response.denied {
    background: rgba(217,79,79,0.08);
    border: 1px solid rgba(217,79,79,0.2);
  }

  .mgmt-response-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .mgmt-response.quoted .mgmt-response-label { color: var(--success); }
  .mgmt-response.denied .mgmt-response-label { color: var(--danger); }

  .price-line {
    font-size: 18px;
    font-weight: 600;
    color: var(--success);
  }

  .chevron {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
    margin-left: 8px;
  }

  .chevron.open { transform: rotate(180deg); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* Loading */
  .loading-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--orange), var(--orange-light), var(--orange));
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 2px;
    margin-bottom: 16px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .new-badge {
    display: inline-block;
    background: var(--orange);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    margin-left: 6px;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* ── Install banner ── */
  .install-banner {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--charcoal);
    border-top: 2px solid var(--orange);
    padding: 14px 20px;
    z-index: 200;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    animation: slideUp 0.3s ease;
  }

  .install-banner.show { display: flex; }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .install-banner-text {
    color: #fff;
    font-size: 13px;
    flex: 1;
  }

  .install-banner-text strong {
    display: block;
    font-size: 14px;
    color: var(--orange);
    margin-bottom: 2px;
  }

  .btn-install {
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .btn-install-dismiss {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 0 4px;
  }


  /* ── Counter bid ── */
  .counter-section {
    margin-top: 12px;
    padding: 14px;
    background: rgba(224,120,48,0.06);
    border: 1.5px solid var(--orange);
    border-radius: 10px;
  }

  .counter-section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }

  .counter-field {
    margin-bottom: 10px;
  }

  .counter-field label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
    display: block;
  }

  .counter-field input, .counter-field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    background: var(--card);
    transition: border-color 0.2s;
  }

  .counter-field input:focus, .counter-field textarea:focus {
    border-color: var(--orange);
  }

  .btn-counter-submit {
    width: 100%;
    padding: 11px;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-counter-submit:hover { background: #c96a22; }

  .status-counter { background: rgba(224,120,48,0.12); color: var(--orange); }
  .status-final { background: rgba(45,158,107,0.12); color: var(--success); }
  .status-counter-denied { background: rgba(217,79,79,0.12); color: var(--danger); }

  .round-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .final-price {
    font-size: 20px;
    font-weight: 700;
    color: var(--success);
  }


  /* ── Deal outcome ── */
  .deal-section {
    margin-top: 12px;
    padding: 14px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
  }

  .deal-section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--charcoal);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 12px;
  }

  .deal-grade-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
  }

  .deal-grade-name {
    font-weight: 600;
    font-size: 13px;
    color: var(--charcoal);
    margin-bottom: 8px;
  }

  .deal-grade-price {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .deal-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }

  .deal-btn {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .deal-btn.selected-won {
    background: rgba(45,158,107,0.1);
    border-color: var(--success);
    color: var(--success);
  }

  .deal-btn.selected-lost {
    background: rgba(217,79,79,0.1);
    border-color: var(--danger);
    color: var(--danger);
  }

  .deal-extra-field {
    display: none;
    margin-top: 6px;
  }

  .deal-extra-field.show { display: block; }

  .deal-extra-field input, .deal-extra-field textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    background: var(--bg);
  }

  .deal-extra-field input:focus, .deal-extra-field textarea:focus {
    border-color: var(--orange);
  }

  .btn-deal-submit {
    width: 100%;
    padding: 11px;
    background: var(--charcoal);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.2s;
  }

  .btn-deal-submit:hover { background: #555; }

  .deal-done-summary {
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
  }

  .deal-done-summary.won {
    background: rgba(45,158,107,0.08);
    border: 1px solid rgba(45,158,107,0.2);
    color: var(--success);
  }

  .deal-done-summary.lost {
    background: rgba(217,79,79,0.08);
    border: 1px solid rgba(217,79,79,0.2);
    color: var(--danger);
  }

</style>
</head>
<body>

<header>
  <div class="logo">Lila Polymers</div>
  <div class="sp-badge" id="spNameBadge">Loading...</div>
</header>

<main>
  <!-- New Request Form -->
  <p class="section-title">New Quote Request</p>
  <p class="section-sub">Fill in customer details and add grades below</p>

  <div class="card">
    <div class="field">
      <label>Customer Name *</label>
      <input type="text" id="customerName" placeholder="e.g. Reliance Industries Ltd" autocomplete="off">
    </div>
    <div class="field" style="margin-bottom:0">
      <label>Remarks / Notes <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <textarea id="remarks" rows="2" placeholder="Any special instructions for management..."></textarea>
    </div>
  </div>

  <!-- Grades -->
  <div class="card">
    <div class="grades-header">
      <span class="grades-label">Grades</span>
      <button class="btn-add-grade" onclick="addGradeRow()">＋ Add Grade</button>
    </div>
    <div id="gradesContainer"></div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitRequest()">Submit Quote Request</button>

  <div class="divider"></div>

  <!-- History -->
  <p class="history-title">My Requests <span id="newBadge" style="display:none" class="new-badge">NEW</span></p>
  <div id="historyContainer"><div class="loading-bar"></div></div>
</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getFirestore, collection, addDoc, doc, updateDoc, query, where, orderBy, onSnapshot, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  // ── PASTE YOUR FIREBASE CONFIG HERE ──
  const firebaseConfig = {
    apiKey: "AIzaSyBwH3zGwfuMDHLvaZxug2uWVU35O8a9FQw",
    authDomain: "lila-quotes.firebaseapp.com",
    projectId: "lila-quotes",
    storageBucket: "lila-quotes.firebasestorage.app",
    messagingSenderId: "133968291740",
    appId: "1:133968291740:web:1abb72d1c129ea655d8a59"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── SP Identity — hardcoded ──
  const spId = 'milan';
  const spNames = {
    'bhavesh': 'Bhavesh Panchal',
    'rohit': 'Rohit Trapasiya',
    'ashvitha': 'Ashvitha Talpadi',
    'salim': 'Salim Mujawar',
    'pravin': 'Pravin Gupta',
    'safaljot': 'Safaljot Singh',
    'amit': 'Amit Parekh',
    'jeet': 'Jeet Kapoor',
    'milan': 'Milan Dalal',
    'pankaj': 'Pankaj Bhavsar',
    'upendra': 'Upendra Singh',
    'meet': 'Meet Darji',
    'dummy': 'Dummy User',
  };
  const spName = spNames[spId] || spId;
  document.getElementById('spNameBadge').textContent = spName;
  document.title = `Lila Quotes — ${spName}`;

  // ── Grade rows ──
  let gradeCount = 0;

  window.addGradeRow = function() {
    gradeCount++;
    const container = document.getElementById('gradesContainer');
    const div = document.createElement('div');
    div.className = 'grade-row';
    div.id = `grade-${gradeCount}`;
    div.innerHTML = `
      <div class="grade-row-header">
        <span class="grade-num">Grade ${gradeCount}</span>
        ${gradeCount > 1 ? `<button class="btn-remove" onclick="removeGrade(${gradeCount})">✕</button>` : ''}
      </div>
      <div class="grade-grid">
        <div class="field full">
          <label>Grade / Product *</label>
          <input type="text" placeholder="e.g. Dowlex 2045G" class="grade-input">
        </div>
        <div class="field">
          <label>Quantity (MT) *</label>
          <input type="number" placeholder="e.g. 25" class="qty-input" min="0">
        </div>
        <div class="field">
          <label>Payment Terms *</label>
          <input type="text" placeholder="e.g. 30 days LC" class="payment-input">
        </div>
        <div class="field full">
          <label>Delivery Terms *</label>
          <input type="text" placeholder="e.g. CIF Mumbai, Ex-works" class="delivery-input">
        </div>
      </div>
    `;
    container.appendChild(div);
  };

  window.removeGrade = function(id) {
    document.getElementById(`grade-${id}`)?.remove();
  };

  // Add first row on load
  window.addGradeRow();

  // ── Submit ──
  window.submitRequest = async function() {
    const customerName = document.getElementById('customerName').value.trim();
    const remarks = document.getElementById('remarks').value.trim();

    if (!customerName) { showToast('Enter customer name', 'error'); return; }

    const gradeRows = document.querySelectorAll('.grade-row');
    const grades = [];
    let valid = true;

    gradeRows.forEach(row => {
      const grade = row.querySelector('.grade-input')?.value.trim();
      const qty = row.querySelector('.qty-input')?.value.trim();
      const payment = row.querySelector('.payment-input')?.value.trim();
      const delivery = row.querySelector('.delivery-input')?.value.trim();

      if (!grade || !qty || !payment || !delivery) { valid = false; return; }
      grades.push({ grade, qty, payment, delivery });
    });

    if (!valid || grades.length === 0) {
      showToast('Fill all grade fields', 'error'); return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    try {
      await addDoc(collection(db, 'quotes'), {
        spId,
        spName,
        customerName,
        remarks,
        grades,
        status: 'pending',
        submittedAt: serverTimestamp(),
        response: null
      });
      showToast('Request submitted!', 'success');
      // Reset form
      document.getElementById('customerName').value = '';
      document.getElementById('remarks').value = '';
      document.getElementById('gradesContainer').innerHTML = '';
      gradeCount = 0;
      window.addGradeRow();
    } catch (e) {
      showToast('Error submitting. Try again.', 'error');
      console.error(e);
    }

    btn.disabled = false;
    btn.textContent = 'Submit Quote Request';
  };

  // ── Live history ──
  const historyContainer = document.getElementById('historyContainer');
  let isFirst = true;
  let prevCount = 0;

  const q = query(
    collection(db, 'quotes'),
    where('spId', '==', spId),
    orderBy('submittedAt', 'desc')
  );

  onSnapshot(q, (snapshot) => {
    if (!isFirst && snapshot.docs.length > prevCount) {
      document.getElementById('newBadge').style.display = 'inline-block';
      setTimeout(() => document.getElementById('newBadge').style.display = 'none', 5000);
    }
    prevCount = snapshot.docs.length;
    isFirst = false;

    if (snapshot.empty) {
      historyContainer.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>No requests yet. Submit your first quote above.</div>`;
      return;
    }

    historyContainer.innerHTML = '';
    snapshot.forEach(doc => {
      const d = doc.data();
      historyContainer.appendChild(buildQuoteCard(doc.id, d));
    });
  });

  function buildQuoteCard(id, d) {
    const card = document.createElement('div');
    card.className = 'quote-card';

    const date = d.submittedAt?.toDate
      ? d.submittedAt.toDate().toLocaleDateString('en-IN', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
      : 'Just now';

    // Status logic
    const statusMap = {
      'pending': ['status-pending', '⏳ Pending'],
      'quoted': ['status-quoted', '✓ Quoted'],
      'denied': ['status-denied', '✕ Denied'],
      'counter': ['status-counter', '↩ Counter Bid'],
      'counter_pending': ['status-pending', '⏳ Counter Reviewing'],
      'final': ['status-final', '✓ Final'],
      'final_denied': ['status-counter-denied', '✕ Final Denied'],
      'deal_concluded': ['status-quoted', '🤝 Deal Concluded'],
      'deal_lost': ['status-denied', '❌ Deal Lost'],
    };
    const [statusClass, statusLabel] = statusMap[d.status] || ['status-pending', '⏳ Pending'];

    // Grades
    const gradesHtml = d.grades.map(g => `
      <div class="grade-item">
        <div class="grade-item-name">${g.grade}</div>
        <div class="grade-item-details">
          <div class="detail-pair"><span>Quantity</span>${g.qty} MT</div>
          <div class="detail-pair"><span>Payment</span>${g.payment}</div>
          <div class="detail-pair" style="grid-column:1/-1"><span>Delivery</span>${g.delivery}</div>
          ${g.price ? `<div class="detail-pair" style="grid-column:1/-1"><span>Round 1 Price</span><span class="price-line">₹${Number(g.price).toLocaleString('en-IN')} / KG</span></div>` : ''}
          ${d.counter?.price ? `<div class="detail-pair" style="grid-column:1/-1"><span>Your Counter</span><span style="color:var(--orange);font-weight:600">₹${Number(d.counter.price).toLocaleString('en-IN')} / KG${d.counter.reason ? ` — ${d.counter.reason}` : ''}</span></div>` : ''}
          ${g.finalPrice ? `<div class="detail-pair" style="grid-column:1/-1"><span>Final Price</span><span class="final-price">₹${Number(g.finalPrice).toLocaleString('en-IN')} / KG</span></div>` : ''}
        </div>
      </div>
    `).join('');

    // Response from management (round 1)
    let responseHtml = '';
    if ((d.status === 'quoted' || d.status === 'counter') && d.response) {
      responseHtml = `<div class="mgmt-response quoted"><div class="mgmt-response-label">Management Quote</div>${d.response.remarks ? `<div style="color:var(--charcoal-light);font-size:13px">${d.response.remarks}</div>` : ''}</div>`;
    } else if (d.status === 'denied' && d.response) {
      responseHtml = `<div class="mgmt-response denied"><div class="mgmt-response-label">Denied</div><div style="color:var(--charcoal-light);font-size:13px">${d.response.remarks || 'No reason provided'}</div></div>`;
    } else if ((d.status === 'final' || d.status === 'final_denied') && d.finalResponse) {
      const isFinalDenied = d.status === 'final_denied';
      responseHtml = `
        ${d.response ? `<div class="mgmt-response quoted"><div class="mgmt-response-label">Round 1 Quote</div>${d.response.remarks ? `<div style="color:var(--charcoal-light);font-size:13px">${d.response.remarks}</div>` : ''}</div>` : ''}
        ${d.counter ? `<div class="mgmt-response" style="background:rgba(224,120,48,0.08);border:1px solid rgba(224,120,48,0.2);margin-top:8px"><div class="mgmt-response-label" style="color:var(--orange)">Your Counter</div><div style="color:var(--charcoal-light);font-size:13px">₹${Number(d.counter.price).toLocaleString('en-IN')} / KG${d.counter.reason ? ` — ${d.counter.reason}` : ''}</div></div>` : ''}
        <div class="mgmt-response ${isFinalDenied ? 'denied' : 'quoted'}" style="margin-top:8px">
          <div class="mgmt-response-label">Final Response</div>
          <div style="color:var(--charcoal-light);font-size:13px">${d.finalResponse.remarks || ''}</div>
        </div>
      `;
    } else if (d.status === 'counter_pending' && d.counter) {
      responseHtml = `
        ${d.response ? `<div class="mgmt-response quoted"><div class="mgmt-response-label">Round 1 Quote</div>${d.response.remarks ? `<div style="color:var(--charcoal-light);font-size:13px">${d.response.remarks}</div>` : ''}</div>` : ''}
        <div class="mgmt-response" style="background:rgba(224,120,48,0.08);border:1px solid rgba(224,120,48,0.2);margin-top:8px">
          <div class="mgmt-response-label" style="color:var(--orange)">Your Counter — Awaiting Response</div>
          <div style="color:var(--charcoal-light);font-size:13px">₹${Number(d.counter.price).toLocaleString('en-IN')} / KG${d.counter.reason ? ` — ${d.counter.reason}` : ''}</div>
        </div>
      `;
    }

    // Counter bid form — only show if status is 'quoted'
    let counterFormHtml = '';
    if (d.status === 'quoted') {
      counterFormHtml = `
        <div class="counter-section">
          <div class="counter-section-label">↩ Request Counter Bid</div>
          <div class="counter-field">
            <label>Your Counter Price (₹ / KG)</label>
            <input type="number" id="counter-price-${id}" placeholder="e.g. 95" min="0">
          </div>
          <div class="counter-field">
            <label>Reason <span style="font-weight:400;text-transform:none">(optional)</span></label>
            <textarea id="counter-reason-${id}" rows="2" placeholder="e.g. Customer is pushing back on price..."></textarea>
          </div>
          <button class="btn-counter-submit" onclick="submitCounter('${id}')">Submit Counter Bid</button>
        </div>
      `;
    }

    // Deal outcome section — show after quoted or final, before deal is marked
    let dealSectionHtml = '';
    if (d.status === 'quoted' || d.status === 'final') {
      const pricePer = d.status === 'final' ? 'finalPrice' : 'price';
      const gradesForDeal = d.grades.map((g, idx) => `
        <div class="deal-grade-row" id="deal-grade-row-${id}-${idx}">
          <div class="deal-grade-name">${g.grade}</div>
          <div class="deal-grade-price">Quoted: ₹${Number(g[pricePer] || g.price).toLocaleString('en-IN')} / KG</div>
          <div class="deal-toggle">
            <button class="deal-btn" id="deal-won-${id}-${idx}" onclick="selectDeal('${id}', ${idx}, 'won')">✅ Concluded</button>
            <button class="deal-btn" id="deal-lost-${id}-${idx}" onclick="selectDeal('${id}', ${idx}, 'lost')">❌ Lost</button>
          </div>
          <div class="deal-extra-field" id="deal-won-fields-${id}-${idx}">
            <input type="number" id="deal-qty-${id}-${idx}" placeholder="Actual qty sold (MT)" min="0">
          </div>
          <div class="deal-extra-field" id="deal-lost-fields-${id}-${idx}">
            <textarea id="deal-reason-${id}-${idx}" rows="2" placeholder="Reason for loss (e.g. price too high, competitor)"></textarea>
          </div>
        </div>
      `).join('');

      dealSectionHtml = `
        <div class="deal-section">
          <div class="deal-section-label">📋 Deal Outcome</div>
          ${gradesForDeal}
          <button class="btn-deal-submit" onclick="submitDealOutcome('${id}', ${d.grades.length}, '${d.status}')">Submit Outcome</button>
        </div>
      `;
    } else if (d.status === 'deal_concluded' || d.status === 'deal_lost') {
      const isDone = d.status === 'deal_concluded';
      dealSectionHtml = `
        <div class="deal-done-summary ${isDone ? 'won' : 'lost'}">
          <strong>${isDone ? '🤝 Deal Concluded' : '❌ Deal Lost'}</strong>
          ${d.dealOutcome?.grades ? d.dealOutcome.grades.map(g => `
            <div style="margin-top:6px;padding:6px 0;border-top:1px solid rgba(0,0,0,0.06)">
              <strong>${g.grade}</strong><br>
              ${g.outcome === 'won' ? `Qty: ${g.qtySold} MT · ₹${Number(g.price).toLocaleString('en-IN')} / KG` : `Lost: ${g.lostReason || 'No reason given'}`}
            </div>
          `).join('') : ''}
        </div>
      `;
    }

    card.innerHTML = `
      <div class="quote-card-header" onclick="toggleCard('${id}')">
        <div>
          <div class="quote-customer">${d.customerName}</div>
          <div class="quote-meta">${d.grades.length} grade${d.grades.length > 1 ? 's' : ''} · ${date}</div>
        </div>
        <div style="display:flex;align-items:center">
          <span class="status-pill ${statusClass}">${statusLabel}</span>
          <span class="chevron" id="chev-${id}">▼</span>
        </div>
      </div>
      <div class="quote-body" id="body-${id}">
        ${d.remarks ? `<div style="font-size:13px;color:var(--muted);margin-bottom:10px;font-style:italic">"${d.remarks}"</div>` : ''}
        ${gradesHtml}
        ${responseHtml}
        ${counterFormHtml}
        ${dealSectionHtml}
      </div>
    `;

    // Auto-open if action needed
    if (d.status === 'quoted' || d.status === 'final') {
      setTimeout(() => {
        document.getElementById(`body-${id}`)?.classList.add('open');
        document.getElementById(`chev-${id}`)?.classList.add('open');
      }, 50);
    }

    return card;
  }

  // ── Submit Counter ──
  window.submitCounter = async function(docId) {
    const price = document.getElementById(`counter-price-${docId}`)?.value.trim();
    const reason = document.getElementById(`counter-reason-${docId}`)?.value.trim() || '';

    if (!price || isNaN(price) || Number(price) <= 0) {
      showToast('Enter your counter price', 'error'); return;
    }

    try {
      await updateDoc(doc(db, 'quotes', docId), {
        status: 'counter_pending',
        counter: { price, reason, submittedAt: serverTimestamp() }
      });
      showToast('Counter bid submitted ✓', 'success');
    } catch (e) {
      showToast('Error. Try again.', 'error');
      console.error(e);
    }
  };

  window.toggleCard = function(id) {
    const body = document.getElementById(`body-${id}`);
    const chev = document.getElementById(`chev-${id}`);
    body.classList.toggle('open');
    chev.classList.toggle('open');
  };

  // ── Toast ──
  
  // ── PWA Install prompt ──
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.add('show');
  });

  document.getElementById('installBtn')?.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('show');
    }
  });

  window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').classList.remove('show');
  });

  // ── Deal outcome selection ──
  window.selectDeal = function(docId, idx, outcome) {
    const wonBtn = document.getElementById(`deal-won-${docId}-${idx}`);
    const lostBtn = document.getElementById(`deal-lost-${docId}-${idx}`);
    const wonFields = document.getElementById(`deal-won-fields-${docId}-${idx}`);
    const lostFields = document.getElementById(`deal-lost-fields-${docId}-${idx}`);

    wonBtn.className = `deal-btn${outcome === 'won' ? ' selected-won' : ''}`;
    lostBtn.className = `deal-btn${outcome === 'lost' ? ' selected-lost' : ''}`;
    wonFields.className = `deal-extra-field${outcome === 'won' ? ' show' : ''}`;
    lostFields.className = `deal-extra-field${outcome === 'lost' ? ' show' : ''}`;
  };

  // ── Submit deal outcome ──
  window.submitDealOutcome = async function(docId, gradeCount, currentStatus) {
    const gradesOutcome = [];
    let allSelected = true;
    let anyWon = false;

    for (let i = 0; i < gradeCount; i++) {
      const wonBtn = document.getElementById(`deal-won-${docId}-${i}`);
      const lostBtn = document.getElementById(`deal-lost-${docId}-${i}`);
      const isWon = wonBtn?.classList.contains('selected-won');
      const isLost = lostBtn?.classList.contains('selected-lost');

      if (!isWon && !isLost) { allSelected = false; break; }

      const grade = document.querySelector(`#deal-grade-row-${docId}-${i} .deal-grade-name`)?.textContent;
      const priceEl = document.querySelector(`#deal-grade-row-${docId}-${i} .deal-grade-price`)?.textContent;
      const price = priceEl?.match(/₹([\d,]+)/)?.[1]?.replace(/,/g, '') || '0';

      if (isWon) {
        anyWon = true;
        const qtySold = document.getElementById(`deal-qty-${docId}-${i}`)?.value.trim();
        if (!qtySold) { showToast('Enter qty sold for concluded grades', 'error'); return; }
        gradesOutcome.push({ grade, outcome: 'won', qtySold, price });
      } else {
        const lostReason = document.getElementById(`deal-reason-${docId}-${i}`)?.value.trim() || '';
        gradesOutcome.push({ grade, outcome: 'lost', lostReason, price });
      }
    }

    if (!allSelected) { showToast('Mark outcome for all grades', 'error'); return; }

    const finalStatus = anyWon ? 'deal_concluded' : 'deal_lost';

    try {
      await updateDoc(doc(db, 'quotes', docId), {
        status: finalStatus,
        dealOutcome: { grades: gradesOutcome, closedAt: serverTimestamp() }
      });
      showToast(anyWon ? '🤝 Deal outcome saved!' : '❌ Deal marked as lost', anyWon ? 'success' : '');
    } catch (e) {
      showToast('Error. Try again.', 'error');
      console.error(e);
    }
  };

  window.showToast = function(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 2800);
  };
</script>
<!-- Install Banner -->
<div class="install-banner" id="installBanner">
  <div class="install-banner-text">
    <strong>Add to Home Screen</strong>
    Use this as an app on your phone
  </div>
  <button class="btn-install" id="installBtn">Install</button>
  <button class="btn-install-dismiss" onclick="document.getElementById('installBanner').classList.remove('show')">✕</button>
</div>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('SW registered');
      }).catch(err => console.log('SW failed:', err));
    });
  }
</script>
</body>
