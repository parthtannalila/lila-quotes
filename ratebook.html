<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3D3D3D">
<title>Lila Ratebook</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #E07830;
  --orange-light: #f5a05a;
  --orange-dim: rgba(224,120,48,0.12);
  --orange-dim2: rgba(224,120,48,0.06);
  --charcoal: #3D3D3D;
  --charcoal-light: #5a5a5a;
  --bg: #f7f5f2;
  --card: #ffffff;
  --border: #e8e3dc;
  --border-light: #f0ece6;
  --text: #2a2a2a;
  --muted: #9a9a9a;
  --success: #2d9e6b;
  --success-dim: rgba(45,158,107,0.1);
  --radius: 14px;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
header {
  background: var(--charcoal);
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  color: var(--orange);
  letter-spacing: 0.3px;
  white-space: nowrap;
  flex-shrink: 0;
}

.header-search {
  flex: 1;
  position: relative;
  max-width: 320px;
}

.header-search input {
  width: 100%;
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 9px 14px 9px 36px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: #fff;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}

.header-search input::placeholder { color: rgba(255,255,255,0.4); }
.header-search input:focus {
  border-color: var(--orange);
  background: rgba(255,255,255,0.15);
}

.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.4);
  font-size: 15px;
  pointer-events: none;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  background: var(--charcoal);
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 0 16px;
  gap: 4px;
}

.tab-btn {
  padding: 10px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}

.tab-btn.active {
  color: var(--orange);
  border-bottom-color: var(--orange);
}

/* ── Filter bar ── */
.filter-bar {
  padding: 12px 16px;
  overflow-x: auto;
  display: flex;
  gap: 8px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}

.filter-bar::-webkit-scrollbar { display: none; }

.filter-chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg);
  border: 1.5px solid var(--border);
  color: var(--charcoal-light);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.filter-chip.active {
  background: var(--orange);
  border-color: var(--orange);
  color: #fff;
}

/* ── Results bar ── */
.results-bar {
  padding: 10px 16px;
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.active-count {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--success);
  font-weight: 500;
}

.active-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--success);
  display: inline-block;
}

/* ── Main ── */
main {
  padding: 0 0 80px;
}

/* ── Section headers ── */
.section-header {
  padding: 14px 16px 8px;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  background: var(--bg);
  position: sticky;
  top: 105px;
  z-index: 10;
}

/* ── Grade card ── */
.grade-card {
  background: var(--card);
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: background 0.15s;
  overflow: hidden;
}

.grade-card:active { background: #fafaf8; }

.grade-card-header {
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.grade-card-left {
  flex: 1;
  min-width: 0;
}

.grade-name {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  word-break: break-word;
}

.grade-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
  flex-wrap: wrap;
}

.grade-supplier {
  font-size: 12px;
  color: var(--charcoal-light);
  font-weight: 500;
}

.grade-sub {
  font-size: 11px;
  color: var(--muted);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
}

.grade-card-right {
  flex-shrink: 0;
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.rate-display {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--success);
  white-space: nowrap;
}

.rate-unit {
  font-size: 11px;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
}

.rate-updated {
  font-size: 10px;
  color: var(--muted);
}

.no-rate {
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
}

.chevron {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  transition: transform 0.2s;
  display: inline-block;
}

.chevron.open { transform: rotate(180deg); }

/* ── Grade expanded body ── */
.grade-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  background: var(--orange-dim2);
  border-top: 1px solid transparent;
}

.grade-body.open {
  max-height: 400px;
  border-top-color: var(--border-light);
}

.grade-body-inner {
  padding: 14px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.detail-row {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.detail-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--muted);
}

.detail-value {
  font-size: 13px;
  color: var(--charcoal-light);
  line-height: 1.4;
}

.tds-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--orange);
  color: #fff;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  transition: background 0.15s;
  align-self: flex-start;
  margin-top: 2px;
}

.tds-btn:active { background: #c96a22; }

/* ── Empty state ── */
.empty-state {
  padding: 60px 20px;
  text-align: center;
}

.empty-state-icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.4;
}

.empty-state-text {
  font-size: 15px;
  color: var(--muted);
}

/* ── Loading ── */
.loading {
  padding: 40px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
}

/* ── Active indicator on card ── */
.active-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 600;
  color: var(--success);
  background: var(--success-dim);
  padding: 2px 7px;
  border-radius: 4px;
}

/* ── Ratebook tab (active grades only) ── */
.rate-card {
  background: var(--card);
  border-bottom: 1px solid var(--border-light);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background 0.15s;
}

.rate-card:active { background: #fafaf8; }

.rate-card-left { min-width: 0; flex: 1; }

.rate-card-name {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}

.rate-card-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.rate-card-right {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}

.rate-big {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--success);
}

.rate-big-unit {
  font-size: 12px;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
}

.rate-date {
  font-size: 11px;
  color: var(--muted);
}

/* ── Sticky updated banner ── */
.update-banner {
  background: var(--success-dim);
  border-bottom: 1px solid rgba(45,158,107,0.2);
  padding: 8px 16px;
  font-size: 12px;
  color: var(--success);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
}

.no-rates-msg {
  padding: 40px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
}
</style>
</head>
<body>

<header>
  <div class="logo">LILA Ratebook</div>
  <div class="header-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search grades..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('ratebook')" id="tab-ratebook">📊 Today's Rates</button>
  <button class="tab-btn" onclick="switchTab('catalogue')" id="tab-catalogue">📚 Catalogue</button>
</div>

<div id="view-ratebook">
  <div id="ratebook-banner" style="display:none"></div>
  <div id="ratebook-content"><div class="loading">Loading rates...</div></div>
</div>

<div id="view-catalogue" style="display:none">
  <div class="filter-bar" id="filterBar"></div>
  <div class="results-bar">
    <span id="resultCount">Loading...</span>
    <span id="activeCount" class="active-count" style="display:none">
      <span class="active-dot"></span>
      <span id="activeCountText"></span>
    </span>
  </div>
  <main id="catalogueContent"></main>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyBFsRqfxNNBNDGoTEeGPbxNJLBqpbKBqJg",
  authDomain: "lila-quotes.firebaseapp.com",
  projectId: "lila-quotes",
});
const db = getFirestore(app);


// ── State ──
let ratesMap = {}; // gradeId -> Firestore doc data
let CATALOGUE = []; // derived from ratesMap on load
let currentTab = 'ratebook';
let activeFilter = 'ALL';
let searchQuery = '';

// ── Build catalogue from ratesMap ──
function buildCatalogue() {
  CATALOGUE = Object.entries(ratesMap)
    .filter(([id, d]) => d.grade_name)
    .map(([id, d]) => ({
      id,
      name: d.grade_name || '',
      group: d.group_name || '',
      sub: d.sub_group || '',
      supplier: d.supplier || '',
      application: d.application || '',
      notes: d.notes || '',
    }))
    .sort((a, b) => a.name.localeCompare(b.name));

  // Rebuild filter chips when catalogue loads
  buildFilterChips();
}

// ── Firestore listener ──
onSnapshot(collection(db, 'grades'), (snap) => {
  ratesMap = {};
  snap.forEach(doc => {
    ratesMap[doc.id] = doc.data();
  });
  buildCatalogue();
  renderCurrentView();
});

// ── Tab switching ──
window.switchTab = function(tab) {
  currentTab = tab;
  document.getElementById('tab-ratebook').classList.toggle('active', tab === 'ratebook');
  document.getElementById('tab-catalogue').classList.toggle('active', tab === 'catalogue');
  document.getElementById('view-ratebook').style.display = tab === 'ratebook' ? 'block' : 'none';
  document.getElementById('view-catalogue').style.display = tab === 'catalogue' ? 'block' : 'none';
  renderCurrentView();
};

function renderCurrentView() {
  if (currentTab === 'ratebook') renderRatebook();
  else renderCatalogue();
}

// ── Format rate ──
function formatRate(rateData) {
  if (!rateData || !rateData.is_active) return null;
  const type = rateData.rate_type;
  if (type === 'range' && rateData.rate_min != null && rateData.rate_max != null) {
    return `₹${Number(rateData.rate_min).toLocaleString('en-IN')} – ${Number(rateData.rate_max).toLocaleString('en-IN')}`;
  }
  if (type === 'single' && rateData.rate_single != null) {
    return `₹${Number(rateData.rate_single).toLocaleString('en-IN')}`;
  }
  return null;
}

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
}

// ── Render Ratebook ──
function renderRatebook() {
  const activeGrades = CATALOGUE.filter(g => {
    const r = ratesMap[g.id];
    return r && r.is_active && formatRate(r);
  });

  const content = document.getElementById('ratebook-content');

  if (activeGrades.length === 0) {
    content.innerHTML = `<div class="no-rates-msg">No active rates set yet.<br><span style="font-size:12px;margin-top:6px;display:block">Management will post today's rates here.</span></div>`;
    return;
  }

  // Find most recent update
  let latestUpdate = null;
  activeGrades.forEach(g => {
    const r = ratesMap[g.id];
    if (r && r.last_updated) {
      const d = r.last_updated.toDate ? r.last_updated.toDate() : new Date(r.last_updated);
      if (!latestUpdate || d > latestUpdate) latestUpdate = d;
    }
  });

  // Apply search
  const query = searchQuery.toLowerCase();
  const filtered = query
    ? activeGrades.filter(g => g.name.toLowerCase().includes(query) || g.group.toLowerCase().includes(query) || (g.supplier || '').toLowerCase().includes(query))
    : activeGrades;

  if (filtered.length === 0) {
    content.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">No active grades match "${searchQuery}"</div></div>`;
    return;
  }

  // Group by polymer group
  const byGroup = {};
  filtered.forEach(g => {
    if (!byGroup[g.group]) byGroup[g.group] = [];
    byGroup[g.group].push(g);
  });

  let html = '';
  if (latestUpdate) {
    const timeStr = latestUpdate.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    const dateStr = latestUpdate.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    html += `<div class="update-banner">✓ Rates updated ${dateStr} at ${timeStr}</div>`;
  }

  Object.keys(byGroup).sort().forEach(group => {
    html += `<div class="section-header">${group}</div>`;
    byGroup[group].forEach(g => {
      const r = ratesMap[g.id];
      const rate = formatRate(r);
      const dateStr = r && r.last_updated ? formatDate(r.last_updated) : '';
      html += `
        <div class="rate-card" onclick="toggleRateCard('${g.id}')">
          <div class="rate-card-left">
            <div style="display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;">
              <span class="rate-card-name">${g.name}</span>
              <span class="rate-big">${rate}<span class="rate-big-unit"> /kg</span></span>
            </div>
            <div class="rate-card-sub">${g.supplier ? g.supplier + ' · ' : ''}${g.sub}${dateStr ? ` · ${dateStr}` : ''}</div>
          </div>
        </div>
        <div class="grade-body" id="rbody-${g.id}">
          <div class="grade-body-inner">
            ${g.application ? `<div class="detail-row"><div class="detail-label">Application</div><div class="detail-value">${g.application}</div></div>` : ''}
            ${r && r.tds_url ? `<a href="${r.tds_url}" target="_blank" class="tds-btn">📄 Download TDS</a>` : ''}
          </div>
        </div>
      `;
    });
  });

  content.innerHTML = html;
}

window.toggleRateCard = function(id) {
  const body = document.getElementById(`rbody-${id}`);
  if (body) body.classList.toggle('open');
};

// ── Build filter chips ──
function buildFilterChips() {
  const filterBar = document.getElementById('filterBar');
  filterBar.innerHTML = '';
  const groups = ['ALL', ...new Set(CATALOGUE.map(g => g.group).filter(Boolean))].sort((a, b) => a === 'ALL' ? -1 : b === 'ALL' ? 1 : a.localeCompare(b));
  groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (g === activeFilter ? ' active' : '');
    btn.textContent = g;
    btn.onclick = () => {
      activeFilter = g;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      renderCatalogue();
    };
    filterBar.appendChild(btn);
  });
}

// ── Render Catalogue ──
function renderCatalogue() {
  const query = searchQuery.toLowerCase();

  let filtered = CATALOGUE.filter(g => {
    const groupMatch = activeFilter === 'ALL' || g.group === activeFilter;
    const searchMatch = !query || g.name.toLowerCase().includes(query) || (g.supplier || '').toLowerCase().includes(query) || g.application.toLowerCase().includes(query);
    return groupMatch && searchMatch;
  });

  const activeCount = filtered.filter(g => ratesMap[g.id]?.is_active).length;

  document.getElementById('resultCount').textContent = `${filtered.length} grade${filtered.length !== 1 ? 's' : ''}`;
  if (activeCount > 0) {
    document.getElementById('activeCount').style.display = 'flex';
    document.getElementById('activeCountText').textContent = `${activeCount} with rates`;
  } else {
    document.getElementById('activeCount').style.display = 'none';
  }

  const content = document.getElementById('catalogueContent');

  if (filtered.length === 0) {
    content.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">No grades match your search</div></div>`;
    return;
  }

  // Group by polymer group
  const byGroup = {};
  filtered.forEach(g => {
    if (!byGroup[g.group]) byGroup[g.group] = [];
    byGroup[g.group].push(g);
  });

  let html = '';
  Object.keys(byGroup).sort().forEach(group => {
    html += `<div class="section-header">${group} <span style="font-weight:400;color:#bbb">(${byGroup[group].length})</span></div>`;
    byGroup[group].forEach(g => {
      const r = ratesMap[g.id];
      const rate = formatRate(r);
      const isActive = r?.is_active && rate;
      html += `
        <div class="grade-card" onclick="toggleCard('${g.id}')">
          <div class="grade-card-header">
            <div class="grade-card-left">
              <div class="grade-name">${g.name}</div>
              <div class="grade-meta">
                ${g.supplier ? `<span class="grade-supplier">${g.supplier}</span>` : ''}
                ${g.sub ? `<span class="grade-sub">${g.sub}</span>` : ''}
                ${isActive ? `<span class="active-badge"><span class="active-dot"></span> Active</span>` : ''}
              </div>
            </div>
            <div class="grade-card-right">
              ${isActive ? `
                <div class="rate-display">${rate}</div>
                <div class="rate-unit">₹ / KG</div>
              ` : `<div class="no-rate">—</div>`}
              <span class="chevron" id="chev-${g.id}">▼</span>
            </div>
          </div>
          <div class="grade-body" id="body-${g.id}">
            <div class="grade-body-inner">
              ${g.application ? `<div class="detail-row"><div class="detail-label">Application</div><div class="detail-value">${g.application}</div></div>` : ''}
              ${r?.tds_url ? `<a href="${r.tds_url}" target="_blank" class="tds-btn">📄 Download TDS</a>` : ''}
              ${!g.application && !r?.tds_url ? `<div style="font-size:13px;color:var(--muted)">No additional details available</div>` : ''}
            </div>
          </div>
        </div>
      `;
    });
  });

  content.innerHTML = html;
}

window.toggleCard = function(id) {
  const body = document.getElementById(`body-${id}`);
  const chev = document.getElementById(`chev-${id}`);
  if (body) { body.classList.toggle('open'); chev?.classList.toggle('open'); }
};

// ── Search ──
document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value;
  renderCurrentView();
});

// Initial render
renderCatalogue();
</script>
</body>
</html>
